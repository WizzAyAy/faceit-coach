name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Sync extension version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const path = 'packages/extension/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          " "$VERSION"

      - name: Zip Chrome (MV3)
        run: pnpm --filter @faceit-coach/extension zip

      - name: Zip Firefox (MV3)
        run: pnpm --filter @faceit-coach/extension zip:firefox

      - name: Stage release artifacts
        run: |
          mkdir -p release-artifacts
          cp packages/extension/.output/faceit-coach-*-chrome.zip "release-artifacts/faceit-coach-${GITHUB_REF_NAME}-chrome.zip"
          cp packages/extension/.output/faceit-coach-*-firefox.zip "release-artifacts/faceit-coach-${GITHUB_REF_NAME}-firefox.zip"
          ls -la release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/faceit-coach-*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Installation

            ### Chrome / Edge / Brave / Opera / Vivaldi
            1. Telecharger `faceit-coach-${{ github.ref_name }}-chrome.zip` ci-dessous et extraire.
            2. Ouvrir `chrome://extensions`, activer **Developer mode** (toggle haut-droit).
            3. **Load unpacked** → selectionner le dossier extrait.
            4. Clic droit sur l'icone de l'extension → **Options**, renseigner `API Base URL` + `Cle API`.

            ### Firefox
            1. Telecharger `faceit-coach-${{ github.ref_name }}-firefox.zip` ci-dessous.
            2. Ouvrir `about:debugging#/runtime/this-firefox` → **Load Temporary Add-on...** → selectionner le `.zip`.
            3. (Pour installation persistante : signer le .xpi via AMO ou utiliser Firefox Developer Edition / ESR avec `xpinstall.signatures.required = false`.)
            4. Clic droit sur l'icone → **Manage Extension** → **Options**, renseigner `API Base URL` + `Cle API`.

            Voir [RELEASE.md](https://github.com/${{ github.repository }}/blob/main/RELEASE.md) pour plus de details.

  deploy-server:
    needs: build-extension
    # Skip prod deploy on prerelease tags (e.g. v1.0.0-beta.1, v1.0.0-rc.1)
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy bot + api via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --tags --prune
            git checkout ${{ github.ref_name }}
            docker compose pull || true
            docker compose up -d --build
            docker compose ps
