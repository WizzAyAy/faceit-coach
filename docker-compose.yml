services:
  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    env_file: .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    mem_limit: 256m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file: .env
    environment:
      API_PORT: 8787
    ports:
      - '8787:8787'
    restart: unless-stopped
    healthcheck:
      test: [CMD, node, -e, "require('http').get('http://127.0.0.1:8787/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
